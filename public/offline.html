<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>亲友圈 - 离线</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #FAF6F0;
      color: #5C4A3D;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    p {
      font-size: 14px;
      color: #8B8B8B;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    button {
      background-color: #E8A87C;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 32px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
    }
    button:active {
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>当前无网络连接</h1>
  <p>请检查网络设置后重试。<br/>恢复网络后将自动刷新页面。</p>
  <button onclick="location.reload()">重试</button>
</body>
</html>
